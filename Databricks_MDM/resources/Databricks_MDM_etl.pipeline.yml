# The main pipeline for Databricks_MDM

resources:
  pipelines:
    Databricks_MDM_etl:
      name: Databricks_MDM_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/Databricks_MDM_etl"

      libraries:
        - glob:
            include: ../src/Databricks_MDM_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
