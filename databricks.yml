# Databricks Asset Bundle configuration
bundle:
  name: databricks-mdm

resources:
  jobs:
    mdm_pipeline:
      name: MDM_End_to_End_Pipeline
      description: Complete MDM pipeline for multi-source master data management

      tasks:
        - task_key: ingest_sources
          notebook_task:
            notebook_path: ./notebooks/01_ingestion/run_ingestion
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.databricks.delta.optimizeWrite.enabled: "true"

        - task_key: entity_matching
          depends_on:
            - task_key: ingest_sources
          notebook_task:
            notebook_path: ./notebooks/02_matching/run_matching
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS4_v2
            num_workers: 4

        - task_key: golden_records
          depends_on:
            - task_key: entity_matching
          notebook_task:
            notebook_path: ./notebooks/03_golden_record/run_golden
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2

        - task_key: quality_checks
          depends_on:
            - task_key: golden_records
          notebook_task:
            notebook_path: ./notebooks/04_quality/run_dq
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"

      email_notifications:
        on_failure:
          - mdm-team@company.com

      max_concurrent_runs: 1
      timeout_seconds: 14400

  clusters:
    mdm_interactive_cluster:
      cluster_name: MDM_Interactive
      spark_version: 14.3.x-scala2.12
      node_type_id: Standard_DS3_v2
      autoscale:
        min_workers: 1
        max_workers: 8
      autotermination_minutes: 120

targets:
  dev:
    mode: development
    workspace:
      host: https://your-workspace.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://your-workspace.cloud.databricks.com
    run_as:
      service_principal_name: mdm-service-principal
