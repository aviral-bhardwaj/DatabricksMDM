# Databricks Asset Bundle configuration
bundle:
  name: databricks-mdm

sync:
  include:
    - "01_ingestion/**"
    - "02_matching/**"
    - "03_golden_record/**"
    - "04_quality/**"
    - "05_catalog/**"
    - "config/**"
    - "sdk/**"
    - "api/**"
    - "workflows/**"

resources:
  jobs:
    mdm_pipeline:
      name: MDM_End_to_End_Pipeline
      description: Complete MDM pipeline for multi-source master data management

      tasks:
        - task_key: ingest_sources
          notebook_task:
            notebook_path: ${workspace.file_path}/01_ingestion/multi_source_connector.py
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: r5d.large
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.databricks.delta.optimizeWrite.enabled: "true"

        - task_key: entity_matching
          depends_on:
            - task_key: ingest_sources
          notebook_task:
            notebook_path: ${workspace.file_path}/02_matching/entity_resolution.py
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: r5d.large
            num_workers: 2

        - task_key: golden_records
          depends_on:
            - task_key: entity_matching
          notebook_task:
            notebook_path: ${workspace.file_path}/03_golden_record/survivorship.py
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: r5d.large
            num_workers: 2

        - task_key: quality_checks
          depends_on:
            - task_key: golden_records
          notebook_task:
            notebook_path: ${workspace.file_path}/04_quality/dq_framework.py
            base_parameters:
              entity_type: customer
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: r5d.large
            num_workers: 2

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"

      email_notifications:
        on_failure:
          - ardb40@gmail.com

      max_concurrent_runs: 1
      timeout_seconds: 14400

  clusters:
    mdm_interactive_cluster:
      cluster_name: MDM_Interactive
      spark_version: 17.3.x-scala2.13
      node_type_id: r5d.large
      autoscale:
        min_workers: 1
        max_workers: 2
      autotermination_minutes: 10

targets:
  dev:
    mode: development
    workspace:
      host: https://dbc-bd6bd71d-fa92.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-bd6bd71d-fa92.cloud.databricks.com
    run_as:
      service_principal_name: mdm-service-principal
